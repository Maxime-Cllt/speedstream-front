services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speedstream-frontend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_MODE=PROD
      - API_URL=${API_URL:-http://api:8080}
      - API_TOKEN=${API_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
